name: Build Projet Coleil

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libsdl2-dev libsdl2-gfx-dev

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare Artifact
        run: |
          mkdir -p ProjetColeil-Linux
          cp build/ProjetColeil ProjetColeil-Linux/
          cp -r Assets ProjetColeil-Linux/
          tar -czvf ProjetColeil-Linux.tar.gz ProjetColeil-Linux/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjetColeil-Linux
          path: ProjetColeil-Linux.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake
        run: |
          choco install cmake -y
          refreshenv

      - name: Download SDL2
        shell: powershell
        run: |
          # Download SDL2 development library
          $SDL2_URL = "https://github.com/libsdl-org/SDL/releases/download/release-2.28.5/SDL2-devel-2.28.5-VC.zip"
          Invoke-WebRequest -Uri $SDL2_URL -OutFile SDL2-devel.zip
          Expand-Archive -Path SDL2-devel.zip -DestinationPath .
          
          # Download SDL2_gfx
          $SDL2GFX_URL = "https://github.com/libsdl-org/SDL2_gfx/releases/download/release-1.0.4/SDL2_gfx-devel-1.0.4-VC.zip"
          if ((Invoke-WebRequest -Uri $SDL2GFX_URL -OutFile SDL2_gfx-devel.zip -PassThru).StatusCode -eq 200) {
            Expand-Archive -Path SDL2_gfx-devel.zip -DestinationPath .
          }

      - name: Setup SDL2 environment
        shell: powershell
        run: |
          $SDL2_DIR = Get-ChildItem -Path . -Filter "SDL2-*" -Directory | Select-Object -First 1
          echo "SDL2_DIR=$($SDL2_DIR.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "SDL2_LIBS=$($SDL2_DIR.FullName)/lib/x64" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "SDL2_INCLUDE=$($SDL2_DIR.FullName)/include" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure CMake
        shell: powershell
        run: |
          $SDL2_DIR = Get-ChildItem -Path . -Filter "SDL2-*" -Directory | Select-Object -First 1
          $SDL2_LIBS = "$($SDL2_DIR.FullName)\lib\x64"
          $SDL2_INCLUDE = "$($SDL2_DIR.FullName)\include"
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -G "Visual Studio 17 2022" -A x64 `
            -DSDL2_INCLUDE_DIR="$SDL2_INCLUDE" `
            -DSDL2_LIBRARY="$SDL2_LIBS\SDL2.lib"

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare Artifact
        shell: pwsh
        run: |
          New-Item -Path "ProjetColeil-Windows" -ItemType Directory -Force | Out-Null
          Copy-Item -Path "build/Release/ProjetColeil.exe" -Destination "ProjetColeil-Windows/"
          Copy-Item -Path "Assets" -Destination "ProjetColeil-Windows/" -Recurse -Force
          Compress-Archive -Path "ProjetColeil-Windows/*" -DestinationPath "ProjetColeil-Windows.zip" -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjetColeil-Windows
          path: ProjetColeil-Windows.zip

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: ProjetColeil-Linux
          path: ./linux-artifacts

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: ProjetColeil-Windows
          path: ./windows-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./linux-artifacts/ProjetColeil-Linux.tar.gz
            ./windows-artifacts/ProjetColeil-Windows.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
